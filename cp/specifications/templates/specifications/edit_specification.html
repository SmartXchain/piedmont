<!DOCTYPE html>
<html>
<head>
    <title>Edit Specification</title>
</head>
<body>
    <h1>Edit Specification: {{ specification.name }}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Changes</button>
    </form>
    <button onclick="window.location.href='{% url 'list_specifications' %}'">Back to Specifications</button>
</body>
</html>

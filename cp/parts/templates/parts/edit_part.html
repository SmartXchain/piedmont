<!DOCTYPE html>
<html>
<head>
    <title>Edit Part</title>
</head>
<body>
    <h1>Edit Part: {{ part.name }}</h1>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save Changes</button>
    </form>
    <button onclick="window.location.href='{% url 'list_parts' %}'">Back to Parts</button>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}Piedmont Aviation{% endblock %}</title>

  <!-- Bootstrap 5.3 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    /* ── TAT Technologies color palette ─────────────────────────── */
    :root {
      --tat-dark:       #2E313F;
      --tat-dark-hover: #3a3e50;
      --tat-blue:       #0066cc;
      --tat-blue-hover: #0052a3;
      --tat-nav-text:   rgba(255, 255, 255, 0.72);
      --tat-nav-active: #ffffff;
      --tat-border:     rgba(255, 255, 255, 0.10);
    }

    /* ── Layout ──────────────────────────────────────────────────── */
    html, body {
      height: 100%;
    }

    body {
      display: flex;
      flex-direction: column;
      background-color: #f4f6f8;
    }

    main.content-wrapper {
      flex: 1;
      padding: 1.5rem 1rem;
    }

    /* ── Navbar ──────────────────────────────────────────────────── */
    .tat-navbar {
      background-color: var(--tat-dark);
      border-bottom: 1px solid var(--tat-border);
    }

    .tat-navbar .navbar-brand {
      color: #fff;
      gap: 0.5rem;
      padding-top: 0.3rem;
      padding-bottom: 0.3rem;
    }

    .tat-navbar .navbar-brand:hover {
      opacity: 0.88;
    }

    .tat-navbar .brand-separator {
      color: rgba(255, 255, 255, 0.25);
      font-weight: 300;
      font-size: 1.1rem;
    }

    .tat-navbar .brand-site {
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: rgba(255, 255, 255, 0.90);
    }

    .tat-navbar .nav-link {
      color: var(--tat-nav-text);
      font-size: 0.8375rem;
      font-weight: 500;
      padding: 0.5rem 0.65rem;
      border-bottom: 2px solid transparent;
      transition: color 0.15s ease, border-color 0.15s ease;
      white-space: nowrap;
    }

    .tat-navbar .nav-link:hover,
    .tat-navbar .nav-link:focus {
      color: var(--tat-nav-active);
    }

    .tat-navbar .nav-link.active,
    .tat-navbar .nav-link[aria-current="page"] {
      color: var(--tat-nav-active);
      border-bottom-color: var(--tat-blue);
    }

    /* Dropdown toggle active — matches child active */
    .tat-navbar .dropdown-toggle.section-active {
      color: var(--tat-nav-active);
      border-bottom-color: var(--tat-blue);
    }

    /* Dropdown menu */
    .tat-navbar .dropdown-menu {
      background-color: var(--tat-dark);
      border: 1px solid var(--tat-border);
      border-top: 2px solid var(--tat-blue);
      border-radius: 0 0 0.375rem 0.375rem;
      padding: 0.25rem 0;
      margin-top: 0 !important;
    }

    .tat-navbar .dropdown-item {
      color: var(--tat-nav-text);
      font-size: 0.8375rem;
      font-weight: 500;
      padding: 0.45rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background-color 0.12s ease, color 0.12s ease;
    }

    .tat-navbar .dropdown-item:hover,
    .tat-navbar .dropdown-item:focus {
      background-color: var(--tat-dark-hover);
      color: var(--tat-nav-active);
    }

    .tat-navbar .dropdown-item.active,
    .tat-navbar .dropdown-item:active {
      background-color: var(--tat-blue);
      color: #fff;
    }

    .tat-navbar .dropdown-divider {
      border-color: var(--tat-border);
    }

    /* User badge */
    .tat-navbar .user-badge {
      color: var(--tat-nav-text);
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.35rem 0.65rem;
    }

    /* Toggler */
    .tat-navbar .navbar-toggler {
      border: 1px solid var(--tat-border);
      padding: 0.3rem 0.5rem;
    }

    .tat-navbar .navbar-toggler:focus {
      box-shadow: 0 0 0 2px var(--tat-blue);
    }

    /* ── Footer ──────────────────────────────────────────────────── */
    .tat-footer {
      background-color: var(--tat-dark);
      color: rgba(255, 255, 255, 0.65);
      border-top: 1px solid var(--tat-border);
      font-size: 0.8125rem;
    }

    .tat-footer a {
      color: rgba(255, 255, 255, 0.80);
      text-decoration: none;
    }

    .tat-footer a:hover {
      color: #fff;
      text-decoration: underline;
    }

    .tat-footer .footer-brand {
      color: #fff;
      font-weight: 600;
    }

    .tat-footer hr {
      border-color: var(--tat-border);
      opacity: 1;
    }
  </style>

  {% block extra_css %}{% endblock %}
</head>

<body>
  {% include "navbar.html" %}

  <main class="content-wrapper" role="main">
    {% block content %}{% endblock %}
  </main>

  {% include "footer.html" %}

  <!-- Bootstrap Bundle JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
